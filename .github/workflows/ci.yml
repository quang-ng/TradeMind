name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trademind
          POSTGRES_PASSWORD: trademind
          POSTGRES_DB: trademind
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trademind"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Migrate
        run: uv run alembic upgrade head

      - name: Test
        run: uv run pytest
