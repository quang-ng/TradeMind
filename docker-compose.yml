services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trademind
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trademind}
      POSTGRES_DB: trademind
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trademind"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - core_net
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6382:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - core_net
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  migrate:
    build:
      context: .
      dockerfile: migrations/Dockerfile
    environment:
      POSTGRES_DSN: postgresql+asyncpg://trademind:${POSTGRES_PASSWORD:-trademind}@postgres:5432/trademind
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - core_net
    restart: "no"

  # Self-hosted local LLM runtime for llm_service's "ollama" provider
  # (services/llm_service/app/providers/ollama_provider.py). Scoped to
  # llm_net only — same Isolated Zone boundary as llm_service itself
  # (PROJECT.md Section 3): no route to freqtrade, risk_engine, or core_net.
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - llm_net
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  # One-shot: pulls OLLAMA_MODEL so it is present before llm_service ever
  # calls it — keeps "docker compose up" free of manual steps (PROJECT.md
  # Section 13) the same way `migrate` does for the schema. Re-running is
  # a cheap no-op once the model is cached.
  ollama-pull:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: ollama:11434
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL:-llama3.2:3b}"]
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - llm_net
    restart: "no"

  # Isolated Zone (PROJECT.md Section 3): no exchange credentials, no route
  # to freqtrade or risk_engine — enforced here by network segmentation,
  # not just convention. Only ever calls out to the LLM provider's API
  # (the anthropic provider) or the ollama service (the ollama provider).
  llm_service:
    build:
      context: .
      dockerfile: services/llm_service/Dockerfile
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_API_KEY: ${LLM_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-5}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - llm_net
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    environment:
      POSTGRES_DSN: postgresql+asyncpg://trademind:${POSTGRES_PASSWORD:-trademind}@postgres:5432/trademind
      REDIS_URL: redis://redis:6379/0
      LLM_SERVICE_URL: http://llm_service:8000/analyze
      TIMEFRAME: ${TIMEFRAME:-5m}
      CANDLE_SETTLE_SECOND: ${CANDLE_SETTLE_SECOND:-15}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      llm_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - core_net
      - llm_net
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  # Core Trading Zone (PROJECT.md Section 3): holds exchange config, sole
  # path to execution. Never on llm_net.
  freqtrade:
    build:
      context: .
      dockerfile: freqtrade/Dockerfile
    environment:
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
      FREQTRADE_API_USER: ${FREQTRADE_API_USER:-}
      FREQTRADE_API_PASS: ${FREQTRADE_API_PASS:-}
      FREQTRADE_JWT_SECRET: ${FREQTRADE_JWT_SECRET:-}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://admin_api:8000/webhooks/freqtrade}
      WEBHOOK_SHARED_SECRET: ${WEBHOOK_SHARED_SECRET:-}
      DRY_RUN: ${DRY_RUN:-true}
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - core_net
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  risk_engine:
    build:
      context: .
      dockerfile: services/risk_engine/Dockerfile
    environment:
      POSTGRES_DSN: postgresql+asyncpg://trademind:${POSTGRES_PASSWORD:-trademind}@postgres:5432/trademind
      REDIS_URL: redis://redis:6379/0
      FREQTRADE_API_URL: http://freqtrade:8080
      FREQTRADE_API_USER: ${FREQTRADE_API_USER:-}
      FREQTRADE_API_PASS: ${FREQTRADE_API_PASS:-}
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
      DRY_RUN: ${DRY_RUN:-true}
      RECONCILIATION_INTERVAL_SECONDS: ${RECONCILIATION_INTERVAL_SECONDS:-60}
      RECONCILIATION_ORDER_AGE_MINUTES: ${RECONCILIATION_ORDER_AGE_MINUTES:-10}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      freqtrade:
        condition: service_healthy
    networks:
      - core_net
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  admin_api:
    build:
      context: .
      dockerfile: services/admin_api/Dockerfile
    environment:
      POSTGRES_DSN: postgresql+asyncpg://trademind:${POSTGRES_PASSWORD:-trademind}@postgres:5432/trademind
      REDIS_URL: redis://redis:6379/0
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      WEBHOOK_SHARED_SECRET: ${WEBHOOK_SHARED_SECRET:-}
      LLM_SERVICE_URL: http://llm_service:8000/analyze
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      llm_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - core_net
      - llm_net
      - admin_net
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  # Administration Zone browser console. Nginx serves the compiled React
  # application and proxies /api to admin_api. The operator supplies the API
  # key in the browser session; no secret is injected into this container.
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      admin_api:
        condition: service_healthy
    networks:
      - admin_net
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  # Administration Zone (PROJECT.md Section 3): outbound-only to Telegram
  # and admin_api; never touches Freqtrade/Binance credentials, and never
  # writes kill-switch state itself — slash commands call back into
  # admin_api's own endpoint (Section 11).
  notifier:
    build:
      context: .
      dockerfile: services/notifier/Dockerfile
    environment:
      POSTGRES_DSN: postgresql+asyncpg://trademind:${POSTGRES_PASSWORD:-trademind}@postgres:5432/trademind
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      ADMIN_API_URL: ${ADMIN_API_URL:-http://admin_api:8000}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      admin_api:
        condition: service_healthy
    networks:
      - core_net
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "5"

networks:
  core_net:
  llm_net:
  admin_net:

volumes:
  postgres_data:
  redis_data:
  ollama_data:
